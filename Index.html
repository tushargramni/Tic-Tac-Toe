<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css">
    <link
      rel="shortcut icon"
      href="https://img.icons8.com/external-beshi-glyph-kerismaker/48/external-Tic-Tac-Toe-planning-strategy-beshi-glyph-kerismaker.png"
      type="image/x-icon"
    />
    
    <title>Document</title>
  </head>
  <body>
    <div class="con-1 container-fluid">
      <b class="fs-1 mx-auto my-auto"> TIC-TAC-TOE </b>
      <b class="fs-3 mx-auto my-3"> Enter Your name </b>
      <form>
        <div class="mb-3">
          <input
            type="text"
            id="input-1"
            class="form-control"
            placeholder="Player-1"
            required
          />
        </div>
        <div class="mb-3">
          <input
            type="text"
            id="input-2"
            class="form-control"
            placeholder="Player-2"
            required
          />
        </div>
      </form>

      <div class="d-grid mx-auto my-3">
        <a
          href="#game"
          class="d-flex btn btn-outline-primary fs-5 my-auto px-5 border border-2"
          id="start"
        >
          Start
        </a>
      </div>
    </div>

    <div class="container-fluid con-2" id="game" style="display: none">
      <b class="fs-1 mx-auto my-auto"> Let's Play TIC-TAC-TOE </b>
      <div class="container game-box mx-auto my-2">
        <div class="row m-2">
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-1"
            onclick="dis(1)"
          >
            1
          </button>
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-2"
            onclick="dis(2)"
          >
            2
          </button>
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-3"
            onclick="dis(3)"
          >
            3
          </button>
        </div>
        <div class="row m-2">
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-4"
            onclick="dis(4)"
          >
            4
          </button>
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-5"
            onclick="dis(5)"
          >
            5
          </button>
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-6"
            onclick="dis(6)"
          >
            6
          </button>
        </div>
        <div class="row m-2">
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-7"
            onclick="dis(7)"
          >
            7
          </button>
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-8"
            onclick="dis(8)"
          >
            8
          </button>
          <button
            class="col m-2 fw-bold text-light btn"
            id="btn-9"
            onclick="dis(9)"
          >
            9
          </button>
        </div>
      </div>
      <div
        class="btn my-3 outline btn-outline-primary fs-5 px-5 py-2 mx-auto"
        id="load"
        onclick="window.location.reload()"
        style="
          visibility: hidden;
          width: max-content;
          height: max-content;
          padding: 1em;
        "
      >
        Reload
      </div>
    </div>
    <div id="name blog"></div>
    <script src="./script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
